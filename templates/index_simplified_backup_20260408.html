        // 内联Bootstrap JavaScript功能

        // 模态框功能
        class Modal {
            constructor(element) {
                this._element = element;
                this._isShown = false;
            }

            show() {
                this._isShown = true;
                this._element.style.display = 'block';
                document.body.classList.add('modal-open');
                this._element.classList.add('show');
            }

            hide() {
                this._isShown = false;
                this._element.style.display = 'none';
                document.body.classList.remove('modal-open');
                this._element.classList.remove('show');
            }

            static getOrCreateInstance(element) {
                return new Modal(element);
            }
        }

        // 标签页功能
        class Tab {
            static show(element) {
                const tabContent = document.querySelector('.tab-content');
                const tabPane = document.querySelector(element.getAttribute('data-bs-target'));

                // 隐藏所有标签页
                tabContent.querySelectorAll('.tab-pane').forEach(pane => {
                    pane.classList.remove('show', 'active');
                });

                // 取消所有标签激活状态
                document.querySelectorAll('[data-bs-toggle="tab"]').forEach(tab => {
                    tab.classList.remove('active');
                });

                // 显示当前标签页
                element.classList.add('active');
                tabPane.classList.add('show', 'active');
            }
        }

        // 下拉菜单功能
        class Dropdown {
            constructor(element) {
                this._element = element;
                this._menu = this._element.querySelector('.dropdown-menu');
                this._isShown = false;

                this._element.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.toggle();
                });

                // 点击其他地方关闭下拉菜单
                document.addEventListener('click', (e) => {
                    if (!this._element.contains(e.target)) {
                        this.hide();
                    }
                });
            }

            toggle() {
                if (this._isShown) {
                    this.hide();
                } else {
                    this.show();
                }
            }

            show() {
                this._isShown = true;
                this._menu.style.display = 'block';
            }

            hide() {
                this._isShown = false;
                this._menu.style.display = 'none';
            }
        }

        // 页面加载函数

        // 初始化语言
        function initLanguage() {
            // 从本地存储获取语言设置，如果没有则使用默认语言
            const savedLang = localStorage.getItem('preferredLanguage');
            if (savedLang && translations[savedLang]) {
                currentLanguage = savedLang;
            }

            // 更新语言选择器显示
            updateLanguageSelector();

            // 应用翻译
            applyTranslations();
        }

        // 更新语言选择器显示
        function updateLanguageSelector() {
            const currentLanguageElement = document.getElementById('currentLanguage');
            if (currentLanguageElement) {
                currentLanguageElement.textContent = translations[currentLanguage].currentLanguage;
            }
        }

        // 应用翻译
        function applyTranslations() {
            // 获取所有需要翻译的元素
            const elements = document.querySelectorAll('[data-i18n]');

            // 遍历元素并应用翻译
            elements.forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[currentLanguage] && translations[currentLanguage][key]) {
                    element.textContent = translations[currentLanguage][key];
                }
            });
        }

        // 切换语言
        function changeLanguage(lang) {
            if (translations[lang]) {
                currentLanguage = lang;
                localStorage.setItem('preferredLanguage', lang);
                updateLanguageSelector();
                applyTranslations();

                // 更新预览图片的提示文字
                updatePreviewImageHint();
            }
        }

        // 更新预览图片的提示文字
        function updatePreviewImageHint() {
            const previewImage = document.getElementById('previewImage');
            if (previewImage) {
                previewImage.title = currentLanguage === 'zh' ? '点击预览原图' :
                                    currentLanguage === 'ja' ? 'クリックで元画像をプレビュー' :
                                    'Click to preview original image';
            }
        }

        // 绑定事件
        function bindEvents() {
            // 语言切换事件
            document.querySelectorAll('.dropdown-item[data-lang]').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const lang = this.getAttribute('data-lang');
                    changeLanguage(lang);
                });
            });

            // 检索标签页事件
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const searchBtn = document.getElementById('searchBtn');
            const clearBtn = document.getElementById('clearBtn');
            const topKSlider = document.getElementById('topK');
            const topKValue = document.getElementById('topKValue');

            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', function() {
                if (this.files[0]) handleFileSelect(this.files[0]);
            });
            searchBtn.addEventListener('click', () => {
                if (currentFile) performSearch(currentFile, parseInt(topKSlider.value));
            });
            clearBtn.addEventListener('click', clearSearch);
            topKSlider.addEventListener('input', function() {
                topKValue.textContent = this.value;
            });

            // 模态框关闭按钮事件
            document.querySelectorAll('[data-bs-dismiss="modal"]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const modal = this.closest('.modal');
                    if (modal) {
                        const modalInstance = new Modal(modal);
                        modalInstance.hide();
                    }
                });
            });
        }

        // 处理文件选择
        function handleFileSelect(file) {
            if (!file.type.match('image.*')) {
                alert(currentLanguage === 'zh' ? '请选择图片文件' :
                      currentLanguage === 'ja' ? '画像ファイルを選択してください' :
                      'Please select an image file');
                return;
            }
            currentFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewImage = document.getElementById('previewImage');
                previewImage.src = e.target.result;
                document.getElementById('previewContainer').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';

                // 添加上传图片的点击预览功能
                previewImage.style.cursor = 'pointer';
                updatePreviewImageHint();
                previewImage.onclick = function() {
                    previewUploadedImage(file, e.target.result);
                };
            };
            reader.readAsDataURL(file);
        }

        // 预览上传的图片
        function previewUploadedImage(file, dataUrl) {
            console.log('🖼️ 预览上传的原图:', file.name);

            const modalElement = document.getElementById('imagePreviewModal');
            const modal = new Modal(modalElement);
            const previewImage = document.getElementById('previewModalImage');

            // 重置状态
            previewImage.src = '';

            // 设置基本信息
            document.getElementById('previewFileName').textContent = file.name;
            document.getElementById('previewFileClass').textContent = translations[currentLanguage].uploadedImage;
            document.getElementById('previewFileSize').textContent = `${(file.size / 1024).toFixed(1)} KB`;

            // 显示文件大小，隐藏相似度
            document.getElementById('fileSizeRow').style.display = 'flex';
            document.getElementById('similarityRow').style.display = 'none';

            // 设置加载占位符
            previewImage.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjBmMGYwIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPua1j+iniOWZqDwvdGV4dD48L3N2Zz4=';

            // 显示模态框
            modal.show();

            // 立即移除灰色背景
            setTimeout(() => {
                const backdrops = document.querySelectorAll('.modal-backdrop');
                backdrops.forEach(backdrop => backdrop.remove());
                document.body.classList.remove('modal-open');
            }, 100);

            // 使用DataURL显示图片（不需要网络请求）
            setTimeout(() => {
                previewImage.src = dataUrl;
                console.log('✅ 上传原图预览加载完成');
            }, 150);

            // 添加模态框关闭事件清理
            const handleHidden = function() {
                previewImage.src = '';
                modalElement.removeEventListener('hidden.bs.modal', handleHidden);
            };
            modalElement.addEventListener('hidden.bs.modal', handleHidden);
        }

        // 清除搜索
        function clearSearch() {
            currentFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('uploadArea').style.display = 'block';
            document.getElementById('resultsContainer').style.display = 'none';
        }

        // 执行搜索
        function performSearch(file, topK) {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('top_k', topK);

            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('resultsContainer').style.display = 'none';

            fetch('/search', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                // 检查响应状态
                if (!response.ok) {
                    // 尝试解析错误响应
                    return response.json().then(data => {
                        throw new Error(data.message || data.detail || '检索失败');
                    }).catch(() => {
                        throw new Error('检索失败，HTTP状态码: ' + response.status);
                    });
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('loadingSpinner').style.display = 'none';
                if (data.status === 'success') {
                    displayResults(data.results);
                } else {
                    alert(currentLanguage === 'zh' ? '检索失败: ' + (data.message || '未知错误') :
                          currentLanguage === 'ja' ? '検索失敗: ' + (data.message || '未知エラー') :
                          'Search failed: ' + (data.message || 'Unknown error'));
                }
            })
            .catch(error => {
                document.getElementById('loadingSpinner').style.display = 'none';
                console.error('检索错误:', error);
                alert(currentLanguage === 'zh' ? '检索过程中发生错误: ' + error.message :
                      currentLanguage === 'ja' ? '検索中にエラーが発生しました: ' + error.message :
                      'An error occurred during search: ' + error.message);
            });
        }

        // 显示结果
        function displayResults(results) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';

            if (results.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center"><p>' +
                    (currentLanguage === 'zh' ? '未找到匹配的图纸' :
                     currentLanguage === 'ja' ? '一致する図面が見つかりませんでした' :
                     'No matching drawings found') + '</p></div>';
            } else {
                results.forEach(result => {
                    const col = document.createElement('div');
                    col.className = 'col-md-4 col-lg-3 mb-3';

                    // 使用result.id构建URL（包含类别路径）
                    const imageUrl = `/image/${encodeURIComponent(result.id)}`;

                    // 显示更精确的相似度（保留2位小数）
                    const similarityPercent = (result.similarity * 100).toFixed(2);

                    // 根据相似度设置颜色
                    let badgeClass = 'bg-primary';
                    if (result.similarity > 0.95) badgeClass = 'bg-success';
                    else if (result.similarity > 0.8) badgeClass = 'bg-info';
                    else if (result.similarity > 0.6) badgeClass = 'bg-warning';
                    else badgeClass = 'bg-secondary';

                    col.innerHTML = `
                        <div class="card result-card">
                            <div class="position-relative">
                                <img src="${imageUrl}"
                                     class="card-img-top result-image img-loading"
                                     alt="${result.filename}"
                                     style="cursor: pointer;"
                                     onload="this.classList.remove('img-loading'); this.classList.add('img-loaded');"
                                     onerror="this.onerror=null; this.classList.remove('img-loading'); this.classList.add('img-loaded'); this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjBmMGYwIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPuWbvueJh+WKoOi9vTwvdGV4dD48L3N2Zz4=';"
                                     onclick="previewSearchResult('${result.id.replace(/'/g, "\\'")}', '${result.class.replace(/'/g, "\\'")}', ${result.similarity})">
                                <span class="similarity-badge ${badgeClass}">${similarityPercent}%</span>
                            </div>
                            <div class="card-body">
                                <h6 class="card-title text-truncate" title="${result.filename}">${result.filename}</h6>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="badge bg-primary">${result.class}</span>
                                    <small class="text-muted">#${result.rank}</small>
                                </div>
                                <!-- 显示更多相似度信息 -->
                                <div class="mt-2">
                                    <small class="text-muted">
                                        ${translations[currentLanguage].distance}${result.distance ? result.distance.toFixed(4) : 'N/A'}
                                    </small>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(col);
                });
            }

            document.getElementById('resultsContainer').style.display = 'block';
        }

        // 预览搜索结果
        function previewSearchResult(id, className, similarity) {
            console.log('🔍 预览搜索结果:', id);

            const modalElement = document.getElementById('imagePreviewModal');
            const modal = new Modal(modalElement);
            const previewImage = document.getElementById('previewModalImage');

            // 重置状态
            previewImage.src = '';

            // 设置基本信息
            document.getElementById('previewFileName').textContent = id.split('/').pop() || id;
            document.getElementById('previewFileClass').textContent = className;
            document.getElementById('previewSimilarity').textContent = `${(similarity * 100).toFixed(1)}%`;

            // 显示相似度，隐藏文件大小
            document.getElementById('fileSizeRow').style.display = 'none';
            document.getElementById('similarityRow').style.display = 'flex';

            // 先显示模态框
            modal.show();

            // 设置加载占位符
            previewImage.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIyMDAiIGZpbGw9IiNmMGYwZjAiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjE0IiBmaWxsPSIjOTk5IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+5rWP6KeI5ZmoPC90ZXh0Pjwvc3ZnPg==';

            // 异步加载图片
            setTimeout(() => {
                loadPreviewImage(id, previewImage);
            }, 50);
        }

        // 加载预览图片
        function loadPreviewImage(imageId, previewImageElement) {
            const imageUrl = `/image/${encodeURIComponent(imageId)}`;
            console.log('📥 加载预览图片:', imageUrl);

            const img = new Image();
            img.onload = function() {
                console.log('✅ 预览图片加载成功');
                previewImageElement.src = imageUrl;
            };
            img.onerror = function() {
                console.log('❌ 预览图片加载失败');
                previewImageElement.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjBmMGYwIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPuWbvueJh+WKoOi9vTwvdGV4dD48L3N2Zz4=';
            };
            img.src = imageUrl;
        }
    </script>
</body>
</html>
